<!DOCTYPE html>
<html lang="ja">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4858695882200914"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ギャラリー | やまのホームページ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 92vw;
      max-height: 86vh;
      border-radius: var(--radius);
      box-shadow: 0 0 80px rgba(56,189,248,0.18);
      animation: lb-pop 0.18s cubic-bezier(.22,1,.36,1);
    }
    @keyframes lb-pop {
      from { transform: scale(0.90); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    #lightbox-close {
      position: absolute;
      top: 20px; right: 24px;
      font-family: var(--mono);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s;
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 6px;
    }
    #lightbox-close:hover { color: var(--cyan); border-color: var(--border2); }
  </style>
</head>
<body>

  <header class="site-header">
    <a class="site-logo" href="index.html">yama<span class="sep">.</span><span class="home-part">home</span></a>
    <div class="header-status">
      <span class="status-dot"></span>
      <span>SERVER ONLINE</span>
    </div>
  </header>

  <h1>🖼 ギャラリー</h1>

  <div class="container">

    <div class="card">
      <div class="card-corner"></div>
      <h2>スクリーンショット</h2>
      <div class="gallery" style="margin-top:8px">
        <img src="images/1.png" alt="スクリーンショット1">
        <img src="images/2.png" alt="スクリーンショット2">
      </div>
      <p style="font-size:0.78rem; color:var(--muted); margin-top:12px; font-family:var(--mono);">
        ※ クリックで拡大表示
      </p>
    </div>

    <div class="card">
      <div class="card-corner"></div>
      <h2>動画</h2>
      <p>サーバー内のスクリーンショットを掲載しています。</p>
      <p>みんなのスクリーンショットもくれたらここに貼ります。</p>
      <p style="margin-top:8px">主からのお願い！この動画を見ていただけるとありがたいです。</p>
      <a href="https://youtu.be/UZSr6tmk4po?si=pG6WBkA3G3u2ymxM" target="_blank" rel="noopener" style="display:inline-flex; align-items:center; gap:8px; margin-top:14px; padding:10px 18px; background:rgba(56,189,248,0.07); border:1px solid rgba(56,189,248,0.2); border-radius:8px; color:var(--cyan); text-decoration:none; font-size:0.85rem; font-family:var(--mono); transition:all 0.2s;">
        ▶&nbsp; たぶん1000mトンネル、手掘りしたら地獄すぎた…
      </a>
    </div>

    <a class="back" href="index.html">トップへ戻る</a>
  </div>

  <footer class="site-footer">© 2026 yama.home</footer>

  <div id="lightbox">
    <span id="lightbox-close">ESC / CLOSE</span>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    const lb      = document.getElementById('lightbox');
    const lbImg   = document.getElementById('lightbox-img');
    const lbClose = document.getElementById('lightbox-close');

    document.querySelectorAll('.gallery img').forEach(img => {
      img.addEventListener('click', () => {
        lbImg.src = img.src;
        lbImg.alt = img.alt;
        lb.classList.add('open');
      });
    });

    const close = () => lb.classList.remove('open');
    lbClose.addEventListener('click', close);
    lb.addEventListener('click', e => { if (e.target === lb) close(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
  </script>

</body>
</html>
